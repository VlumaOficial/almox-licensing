<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlmoxPro - Sistema de Licenciamento</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .status {
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: 600;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .licenses-list {
            margin-top: 20px;
        }
        
        .license-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        
        .license-item strong {
            color: #667eea;
        }
        
        .hidden {
            display: none;
        }
        
        /* Notificações otimizadas */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            max-width: 400px;
            transform: translateX(100%);
            opacity: 0;
            transition: all 0.3s ease;
        }
        
        .notification-show {
            transform: translateX(0);
            opacity: 1;
        }
        
        .notification-hide {
            transform: translateX(100%);
            opacity: 0;
        }
        
        .notification-content {
            background: white;
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .notification-icon {
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        
        .notification-message {
            flex: 1;
            font-weight: 500;
        }
        
        .notification-close {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        
        .notification-close:hover {
            opacity: 1;
        }
        
        .notification-success .notification-content {
            border-left: 4px solid #28a745;
        }
        
        .notification-error .notification-content {
            border-left: 4px solid #dc3545;
        }
        
        .notification-warning .notification-content {
            border-left: 4px solid #ffc107;
        }
        
        .notification-info .notification-content {
            border-left: 4px solid #17a2b8;
        }
        
        /* Melhorias nos inputs */
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        /* Loading melhorado */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        
        /* Responsividade melhorada */
        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }
            
            .dashboard {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .card {
                padding: 20px;
            }
            
            .form-group input, .form-group select {
                font-size: 16px;
                padding: 16px;
            }
        }
        
        @media (max-width: 768px) {
            .notification {
                top: 10px;
                right: 10px;
                left: 10px;
                max-width: none;
                width: calc(100% - 20px);
            }
            
            .notification-content {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 AlmoxPro</h1>
            <p>Sistema de Licenciamento e Gestão de Licenças</p>
        </div>
        
        <div class="dashboard">
            <!-- Validação de Licença -->
            <div class="card">
                <h2>🔍 Validar Licença</h2>
                <form id="validateForm">
                    <div class="form-group">
                        <label for="licenseKey">Chave da Licença:</label>
                        <input type="text" id="licenseKey" placeholder="ALMX-XXXX-XXXX" required>
                    </div>
                    <div class="form-group">
                        <label for="machineId">ID da Máquina:</label>
                        <input type="text" id="machineId" placeholder="ID único da máquina" required>
                    </div>
                    <div class="form-group">
                        <label for="version">Versão:</label>
                        <input type="text" id="version" placeholder="1.0.0" value="1.0.0">
                    </div>
                    <button type="submit" class="btn" id="validateBtn">
                        Validar Licença
                    </button>
                </form>
                <div id="validationStatus"></div>
            </div>
            
            <!-- Ativação de Licença -->
            <div class="card">
                <h2>✅ Ativar Licença</h2>
                <form id="activateForm">
                    <div class="form-group">
                        <label for="clientEmail">Email do Cliente:</label>
                        <input type="email" id="clientEmail" placeholder="cliente@exemplo.com" required>
                    </div>
                    <div class="form-group">
                        <label for="plan">Plano:</label>
                        <select id="plan" required>
                            <option value="">Selecione um plano</option>
                            <option value="trial">Trial (7 dias)</option>
                            <option value="basic">Básico (30 dias)</option>
                            <option value="professional">Profissional (90 dias)</option>
                            <option value="enterprise">Empresarial (365 dias)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="machineIdActivation">ID da Máquina:</label>
                        <input type="text" id="machineIdActivation" placeholder="ID único da máquina" required>
                    </div>
                    <button type="submit" class="btn" id="activateBtn">
                        Ativar Licença
                    </button>
                </form>
                <div id="activationStatus"></div>
            </div>
        </div>
        
        <!-- Dashboard de Licenças -->
        <div class="card">
            <h2>📊 Licenças Ativas</h2>
            <button class="btn" id="refreshBtn" style="margin-bottom: 20px;">
                🔄 Atualizar Lista
            </button>
            <div id="licensesList" class="licenses-list">
                <p>Carregando licenças...</p>
            </div>
        </div>
        
        <!-- Status do Sistema -->
        <div class="card">
            <h2>⚙️ Status do Sistema</h2>
            <div id="systemStatus">
                <p><strong>API:</strong> <span id="apiStatus">Verificando...</span></p>
                <p><strong>Banco:</strong> <span id="dbStatus">Verificando...</span></p>
                <p><strong>Última Verificação:</strong> <span id="lastCheck">-</span></p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
